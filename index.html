<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VIP Predictor</title>

<style>
body{margin:0;background:#000;font-family:sans-serif;}

/* WEBSITE */
iframe{
  width:100%;
  height:100vh;
  border:none;
}

/* IMAGE BUTTON */
.fab-img{
  position:fixed;
  bottom:80px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  z-index:9999;
  object-fit:cover;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
}

/* POPUP */
.popup{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:400px;
  background:#000;
  border:2px solid red;
  border-radius:12px;
  padding:15px;
  z-index:9999;
  display:none;
  color:#fff;
  text-align:center;
}

/* BOXES */
.boxes{
  display:flex;
  gap:10px;
  margin:12px 0;
}
.box{
  flex:1;
  border:1px solid red;
  padding:12px;
  font-weight:bold;
}

/* BUTTON */
button{
  padding:10px 15px;
  background:#000;
  border:1px solid red;
  color:#fff;
}
</style>
</head>

<body>

<!-- WEBSITE -->
<iframe src="https://rajagames3.com/#/login"></iframe>

<!-- IMAGE FLOAT BUTTON -->
<img src="button.jpg" class="fab-img" onclick="openPopup()">

<!-- POPUP -->
<div class="popup" id="popup">

<h2>CARLOS VIP</h2>
<p>Next Result In <span id="timer">60</span>s</p>

<div class="boxes">
  <div class="box" id="color">--</div>
  <div class="box" id="size">--</div>
  <div class="box" id="number">--</div>
</div>

<button onclick="predict()">SHOW</button>
<br><br>
<button onclick="closePopup()">CLOSE</button>

</div>

<script>

let time = 60;
let canPredict = true;

// TIMER
setInterval(()=>{
  time--;

  if(time <= 0){
    time = 60;
    canPredict = true;
  }

  document.getElementById("timer").innerText = time;

},1000);


// OPEN/CLOSE
function openPopup(){
  document.getElementById("popup").style.display="block";
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}


// CENTER MESSAGE
function showMessage(text){

  let msg = document.createElement("div");

  msg.innerText = text;

  msg.style.position = "fixed";
  msg.style.top = "50%";
  msg.style.left = "50%";
  msg.style.transform = "translate(-50%,-50%)";
  msg.style.background = "rgba(0,0,0,0.9)";
  msg.style.color = "#fff";
  msg.style.padding = "15px 25px";
  msg.style.border = "1px solid red";
  msg.style.borderRadius = "10px";
  msg.style.zIndex = "99999";
  msg.style.fontWeight = "bold";
  msg.style.boxShadow = "0 0 20px red";

  document.body.appendChild(msg);

  setTimeout(()=>{
    msg.remove();
  },2000);
}


// PREDICTION
function predict(){

  if(!canPredict){
    showMessage("WAIT FOR NEXT PREDICTION");
    return;
  }

  canPredict = false;

  let colors = ["RED","GREEN","VIOLET"];
  let sizes = ["BIG","SMALL"];
  let num = Math.floor(Math.random()*10);

  let c = colors[Math.floor(Math.random()*3)];
  let s = sizes[Math.floor(Math.random()*2)];

  document.getElementById("color").innerText = c;
  document.getElementById("size").innerText = s;
  document.getElementById("number").innerText = num;

}

</script>

</body>
</html>
